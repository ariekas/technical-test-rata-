version: '3.8'

services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres_auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5431:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    networks:
      - hc_network

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - hc_network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres_auth:5432/auth_db?schema=public
      - JWT_SECRET=supersecretjwtkey123
      - JWT_EXPIRY=1h
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
    depends_on:
      - postgres-auth
      - redis
    networks:
      - hc_network

  postgres-schedule:
    image: postgres:15-alpine
    container_name: postgres_schedule
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schedule_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_schedule:/var/lib/postgresql/data
    networks:
      - hc_network

volumes:
  pgdata_auth:
  pgdata_schedule:

networks:
  hc_network:
    driver: bridge
