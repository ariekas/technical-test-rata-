services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres_auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5431:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hc_network

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hc_network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-auth:5432/auth_db?schema=public
      - JWT_SECRET=supersecretjwtkey123
      - JWT_EXPIRY=1h
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3001/"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hc_network

  postgres-schedule:
    image: postgres:15-alpine
    container_name: postgres_schedule
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schedule_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_schedule:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schedule_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hc_network

  schedule-service:
    build:
      context: ./schedule-service
      dockerfile: Dockerfile
    container_name: schedule_service
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-schedule:5432/schedule_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3002
      - AUTH_SERVICE_URL=http://auth-service:3001/graphql
    depends_on:
      postgres-schedule:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - hc_network

  postgres-notification:
    image: postgres:15-alpine
    container_name: postgres_notification
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata_notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hc_network

volumes:
  pgdata_auth:
  pgdata_schedule:
  pgdata_notification:

networks:
  hc_network:
    driver: bridge

