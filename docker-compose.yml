version: '3.8'

services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres_auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5431:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    networks:
      - hc_network

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - hc_network

volumes:
  pgdata_auth:
  pgdata_schedule:

networks:
  hc_network:
    driver: bridge
